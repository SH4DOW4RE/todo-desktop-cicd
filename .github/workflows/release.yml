name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test and coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Enforce 90% coverage
        run: npm run coverage

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installer
            os: windows-latest
            platform: win32
            arch: x64
            targets: "@electron-forge/maker-squirrel"
          - name: Linux installers
            os: ubuntu-latest
            platform: linux
            arch: x64
            targets: "@electron-forge/maker-deb,@electron-forge/maker-rpm"
          - name: macOS app archive
            os: macos-latest
            platform: darwin
            arch: arm64
            targets: "@electron-forge/maker-zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux maker dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: bash
        run: |
          npx --no-install electron-forge make \
            --platform="${{ matrix.platform }}" \
            --arch="${{ matrix.arch }}" \
            --targets="${{ matrix.targets }}"

      - name: Ad-hoc sign macOS app
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          APP_PATH="$(find out -maxdepth 4 -type d -name '*.app' | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under out"
            find out -maxdepth 6 -print || true
            exit 1
          fi

          echo "Signing app:"
          echo "$APP_PATH"

          codesign --force --deep --sign - "$APP_PATH"

          echo "Verifying signature:"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Recreate macOS ZIP after signing
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          APP_PATH="$(find out -maxdepth 4 -type d -name '*.app' | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under out"
            find out -maxdepth 6 -print || true
            exit 1
          fi

          ZIP_DIR="out/make/zip/darwin/${{ matrix.arch }}"
          ZIP_PATH="$ZIP_DIR/todo-desktop-cicd-darwin-${{ matrix.arch }}-${{ github.ref_name }}.zip"

          mkdir -p "$ZIP_DIR"
          rm -f "$ZIP_PATH"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "Created signed ZIP:"
          ls -lh "$ZIP_PATH"
      
      - name: Verify macOS Gatekeeper status
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          APP_PATH="$(find out -maxdepth 4 -type d -name '*.app' | head -n 1)"

          echo "codesign:"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

          echo "spctl:"
          spctl --assess --type execute --verbose=4 "$APP_PATH" || true

      - name: Collect installer artifacts
        shell: bash
        run: |
          mkdir -p release-assets

          echo "All files produced under out/make:"
          find out/make -maxdepth 10 -type f -print | sort

          echo "Collecting release artifacts..."
          find out/make -maxdepth 10 -type f \( \
            -name "*.exe" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.zip" \
          \) -exec cp -v {} release-assets/ \;

          echo "Collected artifacts:"
          find release-assets -type f -print | sort

          test "$(find release-assets -type f | wc -l)" -gt 0

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installers
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
