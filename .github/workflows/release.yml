name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test and coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Enforce 90% coverage
        run: npm run coverage

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installer
            os: windows-latest
            platform: win32
            targets: "@electron-forge/maker-squirrel"
          - name: Linux installers
            os: ubuntu-latest
            platform: linux
            targets: "@electron-forge/maker-deb,@electron-forge/maker-rpm"
          - name: macOS app archive
            os: macos-latest
            platform: darwin
            targets: "@electron-forge/maker-zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux maker dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npx --no-install electron-forge make --platform="${{ matrix.platform }}" --targets="${{ matrix.targets }}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installers
          path: out/make/**
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
